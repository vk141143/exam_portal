[build]
  command = "bun install && bun run build"
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "20"
  BUN_VERSION = "1.1.0"

[functions]
  directory = ".netlify/functions-internal"
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = false
